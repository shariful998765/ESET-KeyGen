name: Generator

on:
  workflow_dispatch:
    inputs:
      account:
        description: 'Number of Accounts to be generated (default = 0)'
        required: false
        default: '0'
      key:
        description: 'Number of Keys to be generated (default = 1)'
        required: false
        default: '1'
      mail:
        description: 'Choose the mail provider to generate license'
        required: true
        type: choice
        options:
        - 1secmail
        - guerrillamail
        - developermail
        - mailticking
        - fakemail
        - inboxes
        default: developermail
      key_type:
        description: 'Modes of operation'
        required: true
        type: choice
        options:
        - --key
        - --small-business-key
        - --vpn-codes
        default: --key
      os:
        description: 'Operating System of runner'
        required: true
        type: choice
        options:
        - macOS
        - Linux
        - Windows
        default: macOS
jobs:
  GenerateKey:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m venv ${{(runner.os == 'Windows' && '.venv') || 'venv'}}
          source ${{(runner.os == 'Windows' && '.venv\\Scripts\\activate') || 'venv/bin/activate'}}
          pip install -r requirements.txt

      - name: Generating Key
        run: |
          # Determine if the workflow was triggered by a manual dispatch or schedule
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            KEY=${{ github.event.inputs.key }}
            MAIL=${{ github.event.inputs.mail }}
            KEY_TYPE=${{ github.event.inputs.key_type }}
          else
            ACCOUNT=0  # Default value for scheduled runs
            KEY=1     # Default value for scheduled runs
            MAIL=developermail  # Default mail provider for scheduled runs
            KEY_TYPE=--vpn-codes  # Default key type for scheduled runs
          fi

          # Clone the repository (already checked out in the first step)
          # git clone https://github.com/Shariful797/ESET-KeyGen.git 
          # cd ESET-KeyGen || exit 1 

          # Function to generate accounts
          function generate_accounts {
            seq 1 $1 | xargs -I {} -P $1 python3 main.py --chrome --account --email-api ${MAIL} --skip-webdriver-menu --skip-update-check --no-logo --disable-progress-bar
          }

          # Function to generate keys
          function generate_keys {
            seq 1 $1 | xargs -I {} -P $1 python3 main.py --chrome ${KEY_TYPE} --email-api ${MAIL} --skip-webdriver-menu --skip-update-check --no-logo --disable-progress-bar
          }

          # Generate based on input parameters
          if [[ ${ACCOUNT} -ne 0 && ${KEY} -ne 0 ]]; then
            generate_accounts ${ACCOUNT} &
            generate_keys ${KEY}
            wait
            echo -e "\nAccount:" >> $GITHUB_STEP_SUMMARY
            cat ./*ACCOUNTS.txt >> $GITHUB_STEP_SUMMARY || echo "No accounts generated." >> $GITHUB_STEP_SUMMARY
            echo -e "\nKey:" >> $GITHUB_STEP_SUMMARY
            cat ./*KEYS.txt >> $GITHUB_STEP_SUMMARY || echo "No keys generated." >> $GITHUB_STEP_SUMMARY
          elif [[ ${ACCOUNT} -ne 0 ]]; then
            generate_accounts ${ACCOUNT}
            echo -e "\nAccount:" >> $GITHUB_STEP_SUMMARY
            cat ./*ACCOUNTS.txt >> $GITHUB_STEP_SUMMARY || echo "No accounts generated." >> $GITHUB_STEP_SUMMARY
          elif [[ ${KEY} -ne 0 ]]; then
            generate_keys ${KEY}
            echo -e "\nKey:" >> $GITHUB_STEP_SUMMARY
            cat ./*KEYS.txt >> $GITHUB_STEP_SUMMARY || echo "No keys generated." >> $GITHUB_STEP_SUMMARY
          else
            echo "Error! No accounts or keys to generated." >> $GITHUB_STEP_SUMMARY
          fi

          # Deactivate the virtual environment
          deactivate
